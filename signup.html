<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – Stackly Wildlife Tourism</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1c3627;
            --gold: #d4af37;
            --gold-dark: #b5952f;
            --glass: rgba(255,255,255,0.08);
            --glass-border: rgba(255,255,255,0.18);
            --text: #f5f5f5;
            --muted: rgba(255,255,255,0.6);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a1f14 0%, #1c3627 50%, #0d2b1a 100%);
            overflow-x: hidden;
            position: relative;
            padding: 100px 20px 40px;
        }

        /* ── Particles ── */
        .bg-particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(212,175,55,0.12);
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(110vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* ── Orbs ── */
        .orb {
            position: fixed; border-radius: 50%;
            filter: blur(80px); pointer-events: none; z-index: 0;
        }
        .orb-1 { width: 500px; height: 500px; background: rgba(28,54,39,0.6); top: -150px; right: -150px; animation: drift 12s ease-in-out infinite alternate; }
        .orb-2 { width: 350px; height: 350px; background: rgba(212,175,55,0.08); bottom: -80px; left: -80px; animation: drift 16s ease-in-out infinite alternate-reverse; }
        @keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(30px,40px); } }

        /* ── Navbar ── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            background: rgba(10,31,20,0.55);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
        }
        .nav-logo img { height: 44px; }
        .nav-links-list { display: flex; gap: 30px; list-style: none; }
        .nav-links-list a { color: var(--muted); text-decoration: none; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; transition: color 0.3s; }
        .nav-links-list a:hover, .nav-links-list a.active { color: var(--gold); }

        /* ── Card ── */
        .auth-wrapper {
            position: relative; z-index: 10;
            width: 100%; max-width: 500px;
            animation: slideUp 0.8s cubic-bezier(0.25,0.8,0.25,1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 48px 44px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        /* ── Brand ── */
        .auth-brand { text-align: center; margin-bottom: 28px; }
        .auth-brand .auth-logo-link {
            display: inline-block;
            margin-bottom: 20px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .auth-brand .auth-logo-link:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }
        .auth-brand .auth-logo {
            height: 92px;
            display: block;
            object-fit: contain;
        }
        .auth-brand h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #fff; margin-bottom: 6px; }
        .auth-brand p { color: var(--muted); font-size: 0.88rem; }

        /* ── Role Toggle ── */
        .role-toggle {
            display: flex;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 5px;
            margin-bottom: 28px;
            position: relative;
        }
        .role-toggle input[type="radio"] { display: none; }
        .role-toggle label {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 50px;
            cursor: pointer;
            color: var(--muted);
            font-size: 0.88rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: color 0.3s;
            z-index: 1; position: relative;
            display: flex; align-items: center; justify-content: center; gap: 7px;
        }
        .role-toggle input[type="radio"]:checked + label { color: #1c3627; }
        .role-toggle::before {
            content: '';
            position: absolute;
            top: 5px; bottom: 5px; left: 5px;
            width: calc(50% - 5px);
            border-radius: 50px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            box-shadow: 0 4px 14px rgba(212,175,55,0.4);
            transition: transform 0.4s cubic-bezier(0.25,0.8,0.25,1);
        }

        /* ── Step Progress ── */
        .step-indicator {
            display: flex; align-items: center; gap: 0;
            margin-bottom: 28px;
        }
        .step-dot {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 2px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.78rem; font-weight: 700; color: var(--muted);
            transition: all 0.4s;
        }
        .step-dot.active { background: var(--gold); border-color: var(--gold); color: #fff; box-shadow: 0 4px 14px rgba(212,175,55,0.4); }
        .step-dot.done { background: var(--primary); border-color: var(--gold); color: var(--gold); }
        .step-line { flex: 1; height: 2px; background: var(--glass-border); transition: background 0.4s; }
        .step-line.done { background: var(--gold); }

        /* ── Input Groups ── */
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group .input-icon {
            position: absolute; left: 16px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); font-size: 0.9rem; transition: color 0.3s; pointer-events: none;
        }
        .input-group input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 14px 16px 14px 46px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
            outline: none;
        }
        .input-group input::placeholder { color: rgba(255,255,255,0.35); }
        .input-group input:focus {
            background: rgba(255,255,255,0.1);
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
        }
        .input-group input:focus + .input-icon,
        .input-group:focus-within .input-icon { color: var(--gold); }
        .eye-btn {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: var(--muted); cursor: pointer; font-size: 0.9rem; transition: color 0.3s;
        }
        .eye-btn:hover { color: var(--gold); }

        /* Password Strength */
        .strength-bar {
            display: flex; gap: 5px; margin-top: 8px;
        }
        .strength-seg {
            height: 4px; flex: 1; border-radius: 2px;
            background: rgba(255,255,255,0.1);
            transition: background 0.4s;
        }

        /* ── Buttons ── */
        .btn-auth {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border: none; border-radius: 10px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 8px 24px rgba(212,175,55,0.35);
            position: relative; overflow: hidden;
            margin-top: 4px;
        }
        .btn-auth::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
            transition: left 0.5s ease;
        }
        .btn-auth:hover::before { left: 100%; }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(212,175,55,0.5); }
        .btn-auth:active { transform: translateY(0); }

        /* ── Auth Footer ── */
        .auth-footer { text-align: center; margin-top: 24px; color: var(--muted); font-size: 0.88rem; }
        .auth-footer a { color: var(--gold); text-decoration: none; font-weight: 600; transition: opacity 0.2s; }
        .auth-footer a:hover { opacity: 0.8; text-decoration: underline; }

        /* ── Terms ── */
        .terms { font-size: 0.8rem; color: var(--muted); text-align: center; margin-top: 16px; }
        .terms a { color: var(--gold); text-decoration: none; }

        /* ── Responsive ── */
        @media (max-width: 520px) {
            nav { padding: 14px 20px; }
            .nav-links-list { display: none; }
            .auth-card { padding: 36px 22px; }
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="bg-particles" id="particles"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Navbar -->
    <nav>
        <a href="index.html" class="nav-logo">
            <img src="images/logo.webp" alt="Stackly Wildlife Tourism">
        </a>
        <ul class="nav-links-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="destination.html">Destinations</a></li>
            <li><a href="holidaypackage.html">Packages</a></li>
             <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="signup.html" class="active">Sign Up</a></li>
        </ul>
    </nav>

    <!-- Auth Card -->
    <div class="auth-wrapper">
        <div class="auth-card">

            <!-- Brand -->
            <div class="auth-brand">
                <a href="index.html" class="auth-logo-link">
                    <img src="images/logo.webp" alt="Stackly Wildlife Tourism" class="auth-logo">
                </a>
                <h1>Create Account</h1>
                <p>Join Stackly Wildlife Tourism today</p>
            </div>

            <!-- Role Toggle -->
            <div class="role-toggle" id="roleToggle">
                <input type="radio" id="role_user"  name="role" value="user"  checked>
                <label for="role_user"><i class="fa-solid fa-user"></i> Traveler</label>
                <input type="radio" id="role_admin" name="role" value="admin">
                <label for="role_admin"><i class="fa-solid fa-shield-halved"></i> Admin</label>
            </div>

            <!-- Form -->
            <form id="signupForm" novalidate>
                <div class="input-group">
                    <input type="text" id="fullName" placeholder="Full Name" required>
                    <i class="fa-solid fa-user input-icon"></i>
                </div>
                <div class="input-group">
                    <input type="email" id="signupEmail" placeholder="Email Address" required>
                    <i class="fa-solid fa-envelope input-icon"></i>
                </div>
                <div class="input-group">
                    <input type="tel" id="phone" placeholder="Phone Number (optional)">
                    <i class="fa-solid fa-phone input-icon"></i>
                </div>
                <div class="input-group">
                    <input type="password" id="signupPassword" placeholder="Create Password" required>
                    <i class="fa-solid fa-lock input-icon"></i>
                    <button type="button" class="eye-btn" id="eyeBtn1"><i class="fa-solid fa-eye" id="eyeIcon1"></i></button>
                </div>
                <div class="strength-bar" id="strengthBar">
                    <div class="strength-seg" id="seg1"></div>
                    <div class="strength-seg" id="seg2"></div>
                    <div class="strength-seg" id="seg3"></div>
                    <div class="strength-seg" id="seg4"></div>
                </div>
                <div class="input-group" style="margin-top:14px;">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                    <i class="fa-solid fa-lock-open input-icon"></i>
                    <button type="button" class="eye-btn" id="eyeBtn2"><i class="fa-solid fa-eye" id="eyeIcon2"></i></button>
                </div>

                <button type="submit" class="btn-auth">
                    <i class="fa-solid fa-user-plus"></i>&nbsp; Create Account
                </button>
            </form>

            <p class="terms">
                By signing up you agree to our
                <a href="404.html">Terms of Service</a> &amp;
                <a href="404.html">Privacy Policy</a>.
            </p>

            <div class="auth-footer">
                Already have an account? <a href="login.html">&larr; Log in</a>
            </div>
        </div>
    </div>

    <script>
        // ── Particles ──
        (function() {
            const c = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const s = Math.random()*18+6;
                p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*-20}s;opacity:${Math.random()*0.25+0.05};`;
                c.appendChild(p);
            }
        })();

        // ── Role Toggle Pill ──
        (function() {
            const style = document.createElement('style');
            document.head.appendChild(style);
            function movePill() {
                const isAdmin = document.getElementById('role_admin').checked;
                style.textContent = `#roleToggle::before { transform: translateX(${isAdmin ? '100%' : '0'}); }`;
            }
            document.querySelectorAll('#roleToggle input').forEach(r => r.addEventListener('change', movePill));
            movePill();
        })();

        // ── Password Strength ──
        document.getElementById('signupPassword').addEventListener('input', function() {
            const val = this.value;
            const segs = [document.getElementById('seg1'), document.getElementById('seg2'), document.getElementById('seg3'), document.getElementById('seg4')];
            let score = 0;
            if (val.length >= 6) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            const colors = ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71'];
            segs.forEach((seg, i) => {
                seg.style.background = i < score ? colors[score-1] : 'rgba(255,255,255,0.1)';
            });
        });

        // ── Eye Toggle ──
        function makeEye(btnId, iconId, inputId) {
            document.getElementById(btnId).addEventListener('click', function() {
                const inp = document.getElementById(inputId);
                const ic  = document.getElementById(iconId);
                const hidden = inp.type === 'password';
                inp.type = hidden ? 'text' : 'password';
                ic.className = hidden ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
            });
        }
        makeEye('eyeBtn1','eyeIcon1','signupPassword');
        makeEye('eyeBtn2','eyeIcon2','confirmPassword');

        // ── Form Submit ──
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const role  = document.querySelector('#roleToggle input:checked').value;
            const name  = document.getElementById('fullName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const pass  = document.getElementById('signupPassword').value;
            const conf  = document.getElementById('confirmPassword').value;
            if (!name || !email || !pass) return;
            if (pass !== conf) {
                document.getElementById('confirmPassword').style.borderColor = '#e74c3c';
                document.getElementById('confirmPassword').style.boxShadow = '0 0 0 3px rgba(231,76,60,0.2)';
                return;
            }
            window.location.href = role === 'admin' ? 'admin-dashboard.html' : 'user-dashboard.html';
        });
    </script>
</body>
</html>
